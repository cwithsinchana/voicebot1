<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interview Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3a;
    --accent: #7c6af7;
    --accent2: #e8b4f8;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --success: #4ade80;
    --danger: #f87171;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* animated background */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: 
      radial-gradient(ellipse 60% 50% at 20% 30%, rgba(124,106,247,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 70%, rgba(232,180,248,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: min(820px, 95vw);
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 92vh;
    gap: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(124,106,247,0.1);
  }

  /* HEADER */
  header {
    padding: 24px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
  }

  .profile {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .avatar {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: white;
    flex-shrink: 0;
    box-shadow: 0 0 20px rgba(124,106,247,0.4);
  }

  .profile-info h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    font-weight: 400;
    color: var(--text);
  }

  .profile-info p {
    font-size: 12px;
    color: var(--muted);
    font-weight: 300;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }

  .status-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    border-radius: 100px;
    background: var(--surface2);
    border: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
    transition: all 0.3s ease;
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: all 0.3s ease;
  }

  .status-badge.listening .status-dot {
    background: var(--danger);
    box-shadow: 0 0 8px var(--danger);
    animation: pulse-dot 1s infinite;
  }
  .status-badge.listening { color: var(--danger); border-color: rgba(248,113,113,0.3); }

  .status-badge.speaking .status-dot {
    background: var(--accent2);
    box-shadow: 0 0 8px var(--accent2);
    animation: pulse-dot 1.5s infinite;
  }
  .status-badge.speaking { color: var(--accent2); border-color: rgba(232,180,248,0.3); }

  .status-badge.thinking .status-dot {
    background: #fbbf24;
    box-shadow: 0 0 8px #fbbf24;
    animation: pulse-dot 0.8s infinite;
  }
  .status-badge.thinking { color: #fbbf24; border-color: rgba(251,191,36,0.3); }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }

  /* CHAT AREA */
  .chat-area {
    overflow-y: auto;
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .message {
    display: flex;
    gap: 12px;
    animation: slideIn 0.3s ease;
    max-width: 85%;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { align-self: flex-end; flex-direction: row-reverse; }

  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .message.assistant .msg-avatar {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 0 12px rgba(124,106,247,0.3);
  }

  .message.user .msg-avatar {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .msg-bubble {
    padding: 14px 18px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.6;
    font-weight: 300;
  }

  .message.assistant .msg-bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }

  .message.user .msg-bubble {
    background: linear-gradient(135deg, var(--accent), #6358e8);
    color: white;
    border-top-right-radius: 4px;
  }

  .welcome-card {
    text-align: center;
    padding: 40px 24px;
    margin: auto;
  }

  .welcome-card .wave { font-size: 48px; display: block; margin-bottom: 16px; }

  .welcome-card h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    font-weight: 400;
    margin-bottom: 10px;
    background: linear-gradient(135deg, var(--text), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .welcome-card p {
    color: var(--muted);
    font-size: 14px;
    font-weight: 300;
    max-width: 340px;
    margin: 0 auto 28px;
    line-height: 1.7;
  }

  .quick-questions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }

  .quick-q {
    padding: 8px 16px;
    border-radius: 100px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
  }

  .quick-q:hover {
    border-color: var(--accent);
    color: var(--accent2);
    background: rgba(124,106,247,0.08);
    transform: translateY(-1px);
  }

  /* Thinking indicator */
  .thinking-bubble {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 16px 20px;
  }

  .thinking-bubble span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .thinking-bubble span:nth-child(2) { animation-delay: 0.15s; background: var(--accent2); }
  .thinking-bubble span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-8px); opacity: 1; }
  }

  /* CONTROLS */
  .controls {
    padding: 20px 32px 28px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }

  .text-input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }

  .text-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 18px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    font-weight: 300;
  }

  .text-input:focus { border-color: var(--accent); }
  .text-input::placeholder { color: var(--muted); }

  .send-btn {
    width: 46px; height: 46px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--accent), #6358e8);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: white;
    font-size: 18px;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 16px rgba(124,106,247,0.4); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .voice-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }

  .mic-btn {
    position: relative;
    width: 64px; height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    color: white;
    transition: all 0.3s ease;
    box-shadow: 0 4px 24px rgba(124,106,247,0.35);
  }

  .mic-btn:hover { transform: scale(1.08); box-shadow: 0 8px 32px rgba(124,106,247,0.5); }

  .mic-btn.active {
    background: linear-gradient(135deg, var(--danger), #f43f5e);
    box-shadow: 0 4px 24px rgba(248,113,113,0.5);
    animation: mic-pulse 1.5s infinite;
  }

  @keyframes mic-pulse {
    0%, 100% { transform: scale(1); box-shadow: 0 4px 24px rgba(248,113,113,0.5); }
    50% { transform: scale(1.06); box-shadow: 0 8px 40px rgba(248,113,113,0.7); }
  }

  .voice-hint {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-top: 8px;
    font-weight: 300;
    letter-spacing: 0.5px;
  }

  .reset-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 16px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .reset-btn:hover { border-color: var(--danger); color: var(--danger); }

  /* Waveform visualizer */
  .waveform {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 30px;
  }

  .wave-bar {
    width: 3px;
    border-radius: 2px;
    background: var(--accent);
    height: 4px;
    transition: height 0.1s;
  }

  .waveform.active .wave-bar {
    animation: wave-anim 0.8s infinite ease-in-out;
  }

  .waveform.active .wave-bar:nth-child(1) { animation-delay: 0s; }
  .waveform.active .wave-bar:nth-child(2) { animation-delay: 0.1s; }
  .waveform.active .wave-bar:nth-child(3) { animation-delay: 0.2s; }
  .waveform.active .wave-bar:nth-child(4) { animation-delay: 0.1s; }
  .waveform.active .wave-bar:nth-child(5) { animation-delay: 0s; }

  @keyframes wave-anim {
    0%, 100% { height: 4px; }
    50% { height: 22px; }
  }

  @media (max-width: 600px) {
    header { padding: 16px 20px; }
    .chat-area { padding: 20px; }
    .controls { padding: 16px 20px 24px; }
  }
</style>
</head>
<body>

<div class="container">
  <!-- HEADER -->
  <header>
    <div class="profile">
      <div class="avatar" id="avatarInitial">A</div>
      <div class="profile-info">
        <h1 id="candidateName">Sinchana NK</h1>
        <p id="candidateRole">BCA Student</p>
      </div>
    </div>
    <div class="status-badge" id="statusBadge">
      <div class="status-dot"></div>
      <span id="statusText">Ready</span>
    </div>
  </header>

  <!-- CHAT AREA -->
  <div class="chat-area" id="chatArea">
    <div class="welcome-card" id="welcomeCard">
      <span class="wave">👋</span>
      <h2>Hello, Interviewer!</h2>
      <p>Ask me anything — about my experience, skills, projects, or background. Use voice or type below.</p>
      <div class="quick-questions">
        <button class="quick-q" onclick="sendQuick('Tell me about yourself')">Tell me about yourself</button>
        <button class="quick-q" onclick="sendQuick('What are your top skills?')">Top skills</button>
        <button class="quick-q" onclick="sendQuick('Walk me through your experience')">Experience</button>
        <button class="quick-q" onclick="sendQuick('What are your career goals?')">Career goals</button>
        <button class="quick-q" onclick="sendQuick('Tell me about a challenging project')">Key project</button>
        <button class="quick-q" onclick="sendQuick('What is your greatest strength?')">Strengths</button>
      </div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="text-input-row">
      <input class="text-input" id="textInput" placeholder="Type a question..." 
             onkeydown="if(event.key==='Enter') sendText()">
      <button class="send-btn" id="sendBtn" onclick="sendText()">➤</button>
    </div>
    <div class="voice-row">
      <button class="reset-btn" onclick="resetChat()">↺ Reset</button>
      <div style="display:flex; flex-direction:column; align-items:center; gap:4px;">
        <button class="mic-btn" id="micBtn" onclick="toggleListening()">🎤</button>
        <div class="voice-hint" id="voiceHint">Hold to speak</div>
      </div>
      <div class="waveform" id="waveform">
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
      </div>
    </div>
  </div>
</div>

<script>
  // ========== CONFIG ==========
  const BACKEND_URL = window.location.origin; // Same server (Flask serves this file)
  // If running frontend separately, set: const BACKEND_URL = 'http://localhost:5000'
  const SESSION_ID = 'session_' + Math.random().toString(36).substr(2, 9);

  // ========== STATE ==========
  let isListening = false;
  let isSpeaking = false;
  let recognition = null;
  let currentUtterance = null;

  // ========== UI ELEMENTS ==========
  const chatArea = document.getElementById('chatArea');
  const micBtn = document.getElementById('micBtn');
  const statusBadge = document.getElementById('statusBadge');
  const statusText = document.getElementById('statusText');
  const waveform = document.getElementById('waveform');
  const voiceHint = document.getElementById('voiceHint');

  // ========== SPEECH RECOGNITION ==========
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.lang = 'en-US';

    recognition.onresult = (e) => {
      const transcript = e.results[0][0].transcript;
      stopListening();
      sendMessage(transcript);
    };

    recognition.onerror = (e) => {
      console.error('Speech error:', e.error);
      stopListening();
      if (e.error !== 'no-speech') setStatus('ready', 'Ready');
    };

    recognition.onend = () => { if (isListening) stopListening(); };
  }

  function toggleListening() {
    if (isSpeaking) { stopSpeaking(); return; }
    if (isListening) { stopListening(); return; }
    startListening();
  }

  function startListening() {
    if (!recognition) { alert('Speech recognition not supported in this browser. Try Chrome.'); return; }
    isListening = true;
    recognition.start();
    micBtn.classList.add('active');
    micBtn.textContent = '⏹';
    waveform.classList.add('active');
    voiceHint.textContent = 'Listening... tap to stop';
    setStatus('listening', 'Listening');
  }

  function stopListening() {
    isListening = false;
    if (recognition) try { recognition.stop(); } catch(e) {}
    micBtn.classList.remove('active');
    micBtn.textContent = '🎤';
    waveform.classList.remove('active');
    voiceHint.textContent = 'Hold to speak';
    setStatus('ready', 'Ready');
  }

  // ========== TEXT TO SPEECH ==========
  function speak(text) {
    if (!window.speechSynthesis) return;
    stopSpeaking();
    const clean = text.replace(/[*_`#]/g, '').replace(/\n/g, ' ');
    currentUtterance = new SpeechSynthesisUtterance(clean);
    currentUtterance.rate = 0.95;
    currentUtterance.pitch = 1;
    currentUtterance.volume = 1;

    // Try to pick a good voice
    const voices = speechSynthesis.getVoices();
    const preferred = voices.find(v => v.name.includes('Google') && v.lang === 'en-US')
      || voices.find(v => v.lang === 'en-US' && !v.name.includes('Zira'))
      || voices[0];
    if (preferred) currentUtterance.voice = preferred;

    currentUtterance.onstart = () => { isSpeaking = true; micBtn.textContent = '⏹'; setStatus('speaking', 'Speaking'); };
    currentUtterance.onend = () => { isSpeaking = false; micBtn.textContent = '🎤'; setStatus('ready', 'Ready'); };
    speechSynthesis.speak(currentUtterance);
  }

  function stopSpeaking() {
    if (window.speechSynthesis) speechSynthesis.cancel();
    isSpeaking = false;
  }

  // ========== CHAT ==========
  function setStatus(type, label) {
    statusBadge.className = 'status-badge ' + type;
    statusText.textContent = label;
  }

  function addMessage(role, text) {
    const welcome = document.getElementById('welcomeCard');
    if (welcome) welcome.remove();

    const msg = document.createElement('div');
    msg.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = role === 'assistant' ? '🤖' : '👤';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = text;

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatArea.appendChild(msg);
    chatArea.scrollTop = chatArea.scrollHeight;
    return msg;
  }

  function addThinking() {
    const welcome = document.getElementById('welcomeCard');
    if (welcome) welcome.remove();

    const msg = document.createElement('div');
    msg.className = 'message assistant';
    msg.id = 'thinking';

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble thinking-bubble';
    bubble.innerHTML = '<span></span><span></span><span></span>';

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatArea.appendChild(msg);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function removeThinking() {
    const t = document.getElementById('thinking');
    if (t) t.remove();
  }

  async function sendMessage(text) {
    if (!text.trim()) return;
    addMessage('user', text);
    addThinking();
    setStatus('thinking', 'Thinking...');

    const sendBtn = document.getElementById('sendBtn');
    sendBtn.disabled = true;

    try {
      const res = await fetch(`${BACKEND_URL}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, session_id: SESSION_ID })
      });
      const data = await res.json();
      removeThinking();

      if (data.response) {
        addMessage('assistant', data.response);
        speak(data.response);
      } else {
        addMessage('assistant', 'Sorry, I encountered an error: ' + (data.error || 'Unknown'));
        setStatus('ready', 'Ready');
      }
    } catch (err) {
      removeThinking();
      addMessage('assistant', '⚠️ Could not connect to backend. Make sure the Python server is running.');
      setStatus('ready', 'Ready');
    }

    sendBtn.disabled = false;
  }

  function sendText() {
    const input = document.getElementById('textInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    sendMessage(text);
  }

  function sendQuick(q) { sendMessage(q); }

  async function resetChat() {
    await fetch(`${BACKEND_URL}/api/reset`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: SESSION_ID })
    });
    chatArea.innerHTML = `
      <div class="welcome-card" id="welcomeCard">
        <span class="wave">👋</span>
        <h2>Hello, Interviewer!</h2>
        <p>Ask me anything — about my experience, skills, projects, or background. Use voice or type below.</p>
        <div class="quick-questions">
          <button class="quick-q" onclick="sendQuick('Tell me about yourself')">Tell me about yourself</button>
          <button class="quick-q" onclick="sendQuick('What are your top skills?')">Top skills</button>
          <button class="quick-q" onclick="sendQuick('Walk me through your experience')">Experience</button>
          <button class="quick-q" onclick="sendQuick('What are your career goals?')">Career goals</button>
          <button class="quick-q" onclick="sendQuick('Tell me about a challenging project')">Key project</button>
          <button class="quick-q" onclick="sendQuick('What is your greatest strength?')">Strengths</button>
        </div>
      </div>`;
    stopSpeaking();
    setStatus('ready', 'Ready');
  }

  // Load voices async (Chrome needs this)
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
</script>
</body>
</html>
